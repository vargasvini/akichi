name: Android CI

env:
  main_project_module: app

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt update
          sudo apt install -y libssl-dev protobuf-compiler python3-protobuf libopus-dev ffmpeg libavutil-dev libevdev-dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install protobuf python
        run: |
          pip install protobuf==3.12.4
          protoc --version

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform, NDK and CMake
        run: |
          yes | sdkmanager "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653" "cmake;3.22.1" >/dev/null

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: chiakidroid-debug-apk
          path: ${{ env.main_project_module }}/build/outputs/apk/debug/*.apk
          if-no-files-found: error
